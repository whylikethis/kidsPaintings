<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🎨 My Painting Studio!</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #fff8f0;
      --primary: #ff6b6b;
      --secondary: #4ecdc4;
      --accent: #ffe66d;
      --purple: #c77dff;
      --dark: #2d2d2d;
      --card-bg: #ffffff;
      --shadow: 0 6px 24px rgba(0,0,0,0.12);
      --radius: 20px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Floating confetti blobs in background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 10% 20%, rgba(255,107,107,0.12) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(78,205,196,0.12) 0%, transparent 40%),
        radial-gradient(circle at 50% 50%, rgba(255,230,109,0.08) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .wrapper { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 20px; }

    /* ── Header ── */
    header {
      text-align: center;
      padding: 30px 0 20px;
    }
    header h1 {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(2.4rem, 6vw, 4rem);
      color: var(--primary);
      text-shadow: 4px 4px 0 var(--accent), 7px 7px 0 rgba(0,0,0,0.08);
      letter-spacing: 1px;
    }
    header p {
      font-size: 1.15rem;
      color: #888;
      margin-top: 8px;
      font-weight: 700;
    }

    /* ── Screens ── */
    #gallery-screen, #painter-screen { transition: opacity 0.3s; }
    .hidden { display: none !important; }

    /* ── Gallery ── */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }

    .gallery-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      border: 3px solid transparent;
      text-align: center;
    }
    .gallery-card:hover {
      transform: translateY(-6px) scale(1.04);
      box-shadow: 0 12px 32px rgba(0,0,0,0.18);
      border-color: var(--secondary);
    }
    .gallery-card img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: contain;
      border-radius: 12px;
      background: #fafafa;
    }
    .gallery-card .card-label {
      margin-top: 10px;
      font-family: 'Fredoka One', cursive;
      font-size: 1.1rem;
      color: var(--dark);
      text-transform: capitalize;
    }

    /* ── Painter ── */
    #painter-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      padding-top: 10px;
    }

    .painter-header {
      display: flex;
      align-items: center;
      gap: 16px;
      width: 100%;
      max-width: 680px;
    }

    .btn-back {
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 50px;
      padding: 10px 22px;
      font-family: 'Fredoka One', cursive;
      font-size: 1.1rem;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(255,107,107,0.4);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn-back:hover { transform: scale(1.05); box-shadow: 0 6px 18px rgba(255,107,107,0.5); }

    .painting-title {
      font-family: 'Fredoka One', cursive;
      font-size: 1.6rem;
      color: var(--dark);
      flex: 1;
    }

    /* ── Toolbar ── */
    .toolbar {
      background: white;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px 20px;
      width: 100%;
      max-width: 680px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
    }

    .toolbar-label {
      font-weight: 900;
      color: #888;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .color-palette {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      flex: 1;
    }

    .color-swatch {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 3px solid transparent;
      cursor: pointer;
      transition: transform 0.15s, border-color 0.15s;
      box-shadow: 0 3px 8px rgba(0,0,0,0.2);
      position: relative;
    }
    .color-swatch:hover { transform: scale(1.2); }
    .color-swatch.active {
      border-color: var(--dark);
      transform: scale(1.25);
    }
    .color-swatch.active::after {
      content: '✓';
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      color: white;
      text-shadow: 0 1px 2px rgba(0,0,0,0.6);
      font-weight: 900;
    }

    .custom-color-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .custom-color-wrap label {
      font-weight: 700;
      color: #888;
      font-size: 0.85rem;
    }
    #customColor {
      width: 36px;
      height: 36px;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      padding: 0;
      background: none;
    }

    .toolbar-actions {
      display: flex;
      gap: 8px;
    }

    .btn-tool {
      background: var(--secondary);
      color: white;
      border: none;
      border-radius: 50px;
      padding: 9px 18px;
      font-family: 'Fredoka One', cursive;
      font-size: 1rem;
      cursor: pointer;
      box-shadow: 0 3px 10px rgba(78,205,196,0.4);
      transition: transform 0.15s;
      white-space: nowrap;
    }
    .btn-tool:hover { transform: scale(1.06); }
    .btn-tool.btn-reset { background: #ff9f43; box-shadow: 0 3px 10px rgba(255,159,67,0.4); }
    .btn-tool.btn-save { background: var(--purple); box-shadow: 0 3px 10px rgba(199,125,255,0.4); }

    /* Eraser mode */
    .btn-tool.btn-erase { background: #b2bec3; box-shadow: 0 3px 10px rgba(178,190,195,0.4); }
    .btn-tool.btn-erase.active { background: #636e72; }

    /* ── Canvas ── */
    .canvas-wrap {
      background: white;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
      cursor: crosshair;
      position: relative;
      overflow: hidden;
    }
    .canvas-wrap canvas {
      display: block;
      border-radius: 12px;
      max-width: 100%;
      height: auto;
    }

    /* Loading overlay on canvas */
    .canvas-loading {
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius);
      font-family: 'Fredoka One', cursive;
      font-size: 1.4rem;
      color: var(--primary);
    }
    .canvas-loading.hidden { display: none; }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--dark);
      color: white;
      padding: 12px 28px;
      border-radius: 50px;
      font-family: 'Fredoka One', cursive;
      font-size: 1.1rem;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      z-index: 999;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Responsive */
    @media (max-width: 520px) {
      .color-swatch { width: 30px; height: 30px; }
      .painting-title { font-size: 1.2rem; }
    }
  </style>
</head>
<body>
<div class="wrapper">
  <header>
    <h1>🎨 My Painting Studio!</h1>
    <p>Pick a picture and color it in — click any spot to paint!</p>
  </header>

  <!-- ── GALLERY SCREEN ── -->
  <div id="gallery-screen">
    <div class="gallery-grid" id="galleryGrid">
      {% for img in images %}
      <div class="gallery-card" onclick="openPainter('{{ img }}')">
        <img src="{{ url_for('static', filename='images/' + img) }}" alt="{{ img }}"/>
        <div class="card-label">{{ img.split('_', 1)[1].replace('.svg','') if '_' in img else img.replace('.svg','') }}</div>
      </div>
      {% endfor %}
    </div>
  </div>

  <!-- ── PAINTER SCREEN ── -->
  <div id="painter-screen" class="hidden">
    <div class="painter-header">
      <button class="btn-back" onclick="backToGallery()">← Gallery</button>
      <div class="painting-title" id="paintingTitle">Painting</div>
    </div>

    <div class="toolbar">
      <span class="toolbar-label">🖌 Color</span>
      <div class="color-palette" id="colorPalette"></div>
      <div class="custom-color-wrap">
        <label>Custom</label>
        <input type="color" id="customColor" value="#ff6b6b" title="Pick any color"/>
      </div>
      <div class="toolbar-actions">
        <button class="btn-tool btn-erase" id="btnErase" onclick="toggleErase()">⬜ Eraser</button>
        <button class="btn-tool btn-reset" onclick="resetCanvas()">↺ Reset</button>
        <button class="btn-tool btn-save" onclick="saveCanvas()">💾 Save</button>
      </div>
    </div>

    <div class="canvas-wrap" id="canvasWrap">
      <canvas id="paintCanvas"></canvas>
      <div class="canvas-loading" id="canvasLoading">Loading... 🎨</div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ─── Palette ───────────────────────────────────────────────
const COLORS = [
  '#FF0000','#FF6B00','#FFD700','#7CFC00',
  '#00C8FF','#0040FF','#8B00FF','#FF69B4',
  '#8B4513','#A9A9A9','#000000','#FFFFFF',
];

let selectedColor = COLORS[0];
let eraseMode = false;
let originalImageData = null;
let currentSrc = '';

// Build palette
const palette = document.getElementById('colorPalette');
COLORS.forEach(c => {
  const sw = document.createElement('div');
  sw.className = 'color-swatch' + (c === selectedColor ? ' active' : '');
  sw.style.background = c;
  if (c === '#FFFFFF') sw.style.border = '3px solid #ddd';
  sw.onclick = () => pickColor(c, sw);
  palette.appendChild(sw);
});

function pickColor(c, el) {
  eraseMode = false;
  document.getElementById('btnErase').classList.remove('active');
  selectedColor = c;
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
  if (el) el.classList.add('active');
  document.getElementById('customColor').value = rgbToHex(c) || c;
}

document.getElementById('customColor').addEventListener('input', e => {
  eraseMode = false;
  document.getElementById('btnErase').classList.remove('active');
  selectedColor = e.target.value;
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
});

function toggleErase() {
  eraseMode = !eraseMode;
  document.getElementById('btnErase').classList.toggle('active', eraseMode);
}

// ─── Gallery / Painter toggle ───────────────────────────────
function openPainter(filename) {
  currentSrc = '/static/images/' + filename;
  const name = filename.includes('_')
    ? filename.split('_').slice(1).join(' ').replace('.svg','')
    : filename.replace('.svg','');
  document.getElementById('paintingTitle').textContent =
    '🖼 ' + name.charAt(0).toUpperCase() + name.slice(1);
  document.getElementById('gallery-screen').classList.add('hidden');
  document.getElementById('painter-screen').classList.remove('hidden');
  loadImageToCanvas(currentSrc);
}

function backToGallery() {
  document.getElementById('painter-screen').classList.add('hidden');
  document.getElementById('gallery-screen').classList.remove('hidden');
}

// ─── Canvas setup ────────────────────────────────────────────
const canvas = document.getElementById('paintCanvas');
const ctx = canvas.getContext('2d', { willReadFrequently: true });

function loadImageToCanvas(src) {
  document.getElementById('canvasLoading').classList.remove('hidden');
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => {
    // Use fixed canvas size for flood-fill consistency
    canvas.width = 600;
    canvas.height = 600;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    originalImageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    document.getElementById('canvasLoading').classList.add('hidden');
  };
  img.onerror = () => {
    document.getElementById('canvasLoading').classList.add('hidden');
    showToast('⚠️ Could not load image');
  };
  img.src = src + '?t=' + Date.now();
}

function resetCanvas() {
  if (originalImageData) {
    ctx.putImageData(originalImageData, 0, 0);
    showToast('✨ Canvas reset!');
  }
}

// ─── Click to paint ──────────────────────────────────────────
canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const x = Math.floor((e.clientX - rect.left) * scaleX);
  const y = Math.floor((e.clientY - rect.top) * scaleY);

  const fillColor = eraseMode ? '#ffffff' : selectedColor;
  floodFill(x, y, fillColor);
});

// ─── Flood Fill ──────────────────────────────────────────────
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return [r, g, b, 255];
}

function rgbToHex(color) {
  // If already hex
  if (color.startsWith('#')) return color;
  return null;
}

function colorsMatch(data, pos, target, tolerance) {
  return Math.abs(data[pos]   - target[0]) <= tolerance &&
         Math.abs(data[pos+1] - target[1]) <= tolerance &&
         Math.abs(data[pos+2] - target[2]) <= tolerance &&
         Math.abs(data[pos+3] - target[3]) <= tolerance;
}

function floodFill(startX, startY, fillHex) {
  const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const data = imageData.data;
  const W = canvas.width;
  const H = canvas.height;

  const startPos = (startY * W + startX) * 4;
  const targetColor = [data[startPos], data[startPos+1], data[startPos+2], data[startPos+3]];
  const fillColor = hexToRgb(fillHex);

  // Don't fill if same color
  if (colorsMatch(data, startPos, fillColor, 5)) return;

  // BFS with scanline optimization
  const visited = new Uint8Array(W * H);
  const stack = [[startX, startY]];
  const TOLERANCE = 30; // tolerance for slight anti-aliasing

  while (stack.length > 0) {
    const [cx, cy] = stack.pop();
    if (cx < 0 || cx >= W || cy < 0 || cy >= H) continue;

    const idx = cy * W + cx;
    if (visited[idx]) continue;

    const pos = idx * 4;
    if (!colorsMatch(data, pos, targetColor, TOLERANCE)) continue;

    // Scanline: go left and right
    let lx = cx;
    while (lx >= 0) {
      const p = (cy * W + lx) * 4;
      if (!colorsMatch(data, p, targetColor, TOLERANCE) || visited[cy * W + lx]) break;
      visited[cy * W + lx] = 1;
      data[p]   = fillColor[0];
      data[p+1] = fillColor[1];
      data[p+2] = fillColor[2];
      data[p+3] = fillColor[3];
      if (cy > 0)     stack.push([lx, cy - 1]);
      if (cy < H - 1) stack.push([lx, cy + 1]);
      lx--;
    }
    let rx = cx + 1;
    while (rx < W) {
      const p = (cy * W + rx) * 4;
      if (!colorsMatch(data, p, targetColor, TOLERANCE) || visited[cy * W + rx]) break;
      visited[cy * W + rx] = 1;
      data[p]   = fillColor[0];
      data[p+1] = fillColor[1];
      data[p+2] = fillColor[2];
      data[p+3] = fillColor[3];
      if (cy > 0)     stack.push([rx, cy - 1]);
      if (cy < H - 1) stack.push([rx, cy + 1]);
      rx++;
    }
  }

  ctx.putImageData(imageData, 0, 0);
}

// ─── Save ────────────────────────────────────────────────────
function saveCanvas() {
  const link = document.createElement('a');
  link.download = 'my-painting.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
  showToast('🎉 Saved your painting!');
}

// ─── Toast ───────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
</body>
</html>
