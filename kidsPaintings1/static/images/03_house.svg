<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="white"/>
  <!-- House body -->
  <rect x="60" y="190" width="280" height="185" fill="white" stroke="black" stroke-width="8"/>
  <!-- Roof -->
  <polygon points="200,40 360,190 40,190" fill="white" stroke="black" stroke-width="8" stroke-linejoin="round"/>
  <!-- Chimney -->
  <rect x="270" y="70" width="35" height="75" fill="white" stroke="black" stroke-width="7"/>
  <!-- Door -->
  <rect x="165" y="280" width="70" height="95" rx="35" ry="10" fill="white" stroke="black" stroke-width="7"/>
  <!-- Door knob -->
  <circle cx="222" cy="333" r="7" fill="black"/>
  <!-- Left window -->
  <rect x="85" y="225" width="75" height="65" rx="6" fill="white" stroke="black" stroke-width="7"/>
  <line x1="122" y1="225" x2="122" y2="290" stroke="black" stroke-width="5"/>
  <line x1="85" y1="257" x2="160" y2="257" stroke="black" stroke-width="5"/>
  <!-- Right window -->
  <rect x="240" y="225" width="75" height="65" rx="6" fill="white" stroke="black" stroke-width="7"/>
  <line x1="277" y1="225" x2="277" y2="290" stroke="black" stroke-width="5"/>
  <line x1="240" y1="257" x2="315" y2="257" stroke="black" stroke-width="5"/>
  <!-- Smoke puffs -->
  <circle cx="280" cy="52" r="14" fill="white" stroke="black" stroke-width="5"/>
  <circle cx="295" cy="38" r="12" fill="white" stroke="black" stroke-width="5"/>
  <circle cx="308" cy="27" r="9" fill="white" stroke="black" stroke-width="5"/>
  <!-- Ground -->
  <line x1="20" y1="375" x2="380" y2="375" stroke="black" stroke-width="8" stroke-linecap="round"/>
  <!-- Grass tufts -->
  <path d="M30,375 Q35,360 40,375" fill="none" stroke="black" stroke-width="5"/>
  <path d="M350,375 Q355,360 360,375" fill="none" stroke="black" stroke-width="5"/>
  <path d="M370,375 Q375,358 380,375" fill="none" stroke="black" stroke-width="5"/>
</svg>
