<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="white"/>
  <!-- Body -->
  <ellipse cx="200" cy="280" rx="100" ry="85" fill="white" stroke="black" stroke-width="8"/>
  <!-- Head -->
  <circle cx="200" cy="165" r="85" fill="white" stroke="black" stroke-width="8"/>
  <!-- Left ear -->
  <polygon points="130,100 105,45 165,85" fill="white" stroke="black" stroke-width="8" stroke-linejoin="round"/>
  <!-- Right ear -->
  <polygon points="270,100 295,45 235,85" fill="white" stroke="black" stroke-width="8" stroke-linejoin="round"/>
  <!-- Inner left ear -->
  <polygon points="130,95 112,58 158,86" fill="white" stroke="black" stroke-width="4"/>
  <!-- Inner right ear -->
  <polygon points="270,95 288,58 242,86" fill="white" stroke="black" stroke-width="4"/>
  <!-- Eyes -->
  <ellipse cx="170" cy="158" rx="18" ry="20" fill="white" stroke="black" stroke-width="6"/>
  <ellipse cx="230" cy="158" rx="18" ry="20" fill="white" stroke="black" stroke-width="6"/>
  <!-- Pupils -->
  <ellipse cx="170" cy="160" rx="7" ry="14" fill="black"/>
  <ellipse cx="230" cy="160" rx="7" ry="14" fill="black"/>
  <!-- Nose -->
  <polygon points="200,188 192,200 208,200" fill="white" stroke="black" stroke-width="5" stroke-linejoin="round"/>
  <!-- Mouth -->
  <path d="M192,200 Q183,215 172,210" fill="none" stroke="black" stroke-width="5" stroke-linecap="round"/>
  <path d="M208,200 Q217,215 228,210" fill="none" stroke="black" stroke-width="5" stroke-linecap="round"/>
  <!-- Whiskers left -->
  <line x1="190" y1="195" x2="130" y2="185" stroke="black" stroke-width="4" stroke-linecap="round"/>
  <line x1="190" y1="200" x2="130" y2="200" stroke="black" stroke-width="4" stroke-linecap="round"/>
  <line x1="190" y1="205" x2="130" y2="215" stroke="black" stroke-width="4" stroke-linecap="round"/>
  <!-- Whiskers right -->
  <line x1="210" y1="195" x2="270" y2="185" stroke="black" stroke-width="4" stroke-linecap="round"/>
  <line x1="210" y1="200" x2="270" y2="200" stroke="black" stroke-width="4" stroke-linecap="round"/>
  <line x1="210" y1="205" x2="270" y2="215" stroke="black" stroke-width="4" stroke-linecap="round"/>
  <!-- Tail -->
  <path d="M300,300 Q360,250 340,190 Q320,140 355,120" fill="none" stroke="black" stroke-width="10" stroke-linecap="round"/>
  <!-- Paws -->
  <ellipse cx="155" cy="355" rx="35" ry="18" fill="white" stroke="black" stroke-width="7"/>
  <ellipse cx="245" cy="355" rx="35" ry="18" fill="white" stroke="black" stroke-width="7"/>
</svg>
