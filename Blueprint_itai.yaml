blueprint:
  name: Smart Light Restore (Wall Switch Friendly)
  description: Restores light state after power cut and applies default brightness when needed
  domain: automation

  input:
    light_entity:
      name: Light
      selector:
        entity:
          domain: light

    default_brightness:
      name: Default brightness
      default: 200
      selector:
        number:
          min: 1
          max: 255

    default_color:
      name: Default color (optional)
      default: [255, 255, 255]
      selector:
        object: {}

mode: restart

trigger:
  - platform: state
    entity_id: !input light_entity
    from: 'unavailable'
    to: 'off'

action:
  - service: light.turn_on
    target:
      entity_id: !input light_entity
    data:
      brightness: !input default_brightness
      rgb_color: !input default_color